spring.application.name=mockmate-backend

# Server Configuration (Render injects PORT)
server.port=${PORT:8080}

# Database Configuration (MySQL for Production)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:mockmatedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (Disabled in production by lack of property)
spring.h2.console.enabled=false

# Firebase Configuration Path
# In production, you can upload the JSON or provide it via a secret path
mockmate.firebase.config-path=${FIREBASE_CONFIG_PATH:classpath:firebase-service-account.json}

# AI Provider Configuration
mockmate.ai.active-provider=${ACTIVE_AI_PROVIDER:GEMINI}

# API Keys
mockmate.ai.api-key.gemini=${GEMINI_API_KEY:}
